<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Click Custodian — button highlight demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light; }
  html, body {
    margin: 0; padding: 0;
    background: #F5F2EA;
    color: #2B3554;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .host {
    max-width: 560px;
    margin: 0 auto;
    padding: 72px 32px;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px;
    font-weight: 500;
    color: #1B2A4A;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  .subtle {
    color: #5E6A85;
    font-size: 14px;
    margin-bottom: 36px;
  }
  .form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }
  label {
    font-size: 12px;
    font-weight: 600;
    color: #5E6A85;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .field {
    border: 1px solid #D4CFC2;
    background: #fff;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    color: #2B3554;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    justify-content: flex-end;
  }
  .btn {
    border: 1px solid #D4CFC2;
    background: #fff;
    color: #1B2A4A;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    position: relative;
  }
  .btn.primary {
    background: #1B2A4A;
    color: #fff;
    border-color: #1B2A4A;
  }
  /* Simulated indicator — matches the inline styles in content.js:showClickFeedback */
  .click-custodian-indicator {
    position: absolute;
    inset: 0;
    border: 3px solid #4CAF50;
    background-color: rgba(76, 175, 80, 0.2);
    pointer-events: none;
    z-index: 999999;
    box-sizing: border-box;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <div class="host">
    <h1>Sign in to Example SSO</h1>
    <p class="subtle">Confirm your account to continue to the AWS console.</p>

    <div class="form-row">
      <label>Account</label>
      <div class="field">alice@example.com</div>
    </div>
    <div class="form-row">
      <label>Session</label>
      <div class="field">AWS Production · us-east-1</div>
    </div>

    <div class="actions">
      <button class="btn">Cancel</button>
      <button class="btn primary">
        Continue
        <span class="click-custodian-indicator"></span>
      </button>
    </div>
  </div>
</body>
</html>
