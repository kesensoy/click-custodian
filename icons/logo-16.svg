<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <defs>
    <linearGradient id="bg16" gradientUnits="userSpaceOnUse" x1="1" y1="-1" x2="15" y2="17">
      <stop offset="0%" stop-color="#243356"/>
      <stop offset="100%" stop-color="#111c37"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (rx=4 ≈ 25% of 16, slightly tighter than the 28% in larger sizes for pixel-crispness) -->
  <rect x="0" y="0" width="16" height="16" rx="4" ry="4" fill="url(#bg16)"/>

  <!-- Cursor glyph: cranked stroke-width + tighter padding so it reads cleanly at 16px (~81% fill) -->
  <svg x="1.5" y="1.5" width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="#7CB9E8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 4l6 16 2-7 7-2z"/>
  </svg>
</svg>
