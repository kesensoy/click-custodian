<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Click Custodian</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="theme-init.js"></script>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l6 16 2-7 7-2z"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">Click Custodian</div>
      </div>
      <a class="star-cta" id="star-cta" href="https://github.com/kesensoy/click-custodian" target="_blank" rel="noopener noreferrer">
        <span class="star-cta-text star-cta-text--unstarred">Star us?</span>
        <span class="star-cta-text star-cta-text--starred">Thanks!</span>
        <svg class="star-cta-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"/>
        </svg>
      </a>
    </header>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label">Tab auto-close</span>
        <span class="stat-value" id="close-rules-count">0 / 0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Button auto-click</span>
        <span class="stat-value" id="click-rules-count">0 / 0</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn primary" id="open-options">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Open Settings
      </button>
      <button class="btn ghost" id="test-current-tab">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 9l5 12 2-6 6-2z"/>
          <path d="M7.2 2.2l.9 2.2M2.2 7.2l2.2.9M5 5l1.5 1.5M13 3l-.8 2.3"/>
        </svg>
        Test on Current Tab
      </button>
    </div>

    <div class="status" id="status-text">
      <span class="dot" aria-hidden="true"></span>
      <span class="status-msg">Extension is running</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
