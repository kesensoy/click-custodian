<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Custodian</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 16px 0;
      color: #2c3e50;
    }

    .stats {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .stat-item:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      color: #7f8c8d;
    }

    .stat-value {
      font-weight: 600;
      color: #2c3e50;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #3498db;
      color: white;
    }

    .btn-primary:hover {
      background: #2980b9;
    }

    .btn-secondary {
      background: #ecf0f1;
      color: #2c3e50;
    }

    .btn-secondary:hover {
      background: #bdc3c7;
    }

    .status {
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
      color: #7f8c8d;
    }
  </style>
</head>
<body>
  <h1>Click Custodian</h1>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-label">Close Rules:</span>
      <span class="stat-value" id="close-rules-count">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Click Rules:</span>
      <span class="stat-value" id="click-rules-count">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Active Rules:</span>
      <span class="stat-value" id="active-rules-count">0</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="open-options">Open Settings</button>
    <button class="btn-secondary" id="test-current-tab">Test on Current Tab</button>
  </div>

  <div class="status" id="status-text">Extension is running</div>

  <script src="popup.js"></script>
</body>
</html>
